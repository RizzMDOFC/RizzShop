<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RizzShop - Daftar</title>
    <link rel="stylesheet" href="daftar.css">
</head>
<body>
    <div class="container">
        <h2>Daftar di RizzShop</h2>
        <form id="registerForm">
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="numberWhatsApp">Nomor WhatsApp:</label>
                <input type="text" id="numberWhatsApp" name="numberWhatsApp" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="repeatPassword">Ulangi Password:</label>
                <input type="password" id="repeatPassword" name="repeatPassword" required>
            </div>
            <button type="submit">Daftar</button>
        </form>
        <p>Sudah punya akun? <a href="index.html">Masuk sekarang</a></p>
    </div>
    <script src="daftar.js"></script>
</body>
</html>
