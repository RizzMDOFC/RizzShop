<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RizzShop - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Login to RizzShop</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="emailPhoneUsername">Email/Nomor/Username:</label>
                <input type="text" id="emailPhoneUsername" name="emailPhoneUsername" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="otp">OTP Code:</label>
                <input type="text" id="otp" name="otp" required>
                <button type="button" id="requestOTP">Minta OTP</button>
            </div>
            <button type="submit">Login</button>
        </form>
        <p>Belum punya akun? <a href="daftar.html">Daftar sekarang</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
